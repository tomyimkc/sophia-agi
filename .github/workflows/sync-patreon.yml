name: Sync Patreon Supporters

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force update even if no diff detected"
        required: false
        default: false
        type: boolean
  schedule:
    # Run weekly (Sundays at 06:00 UTC). Adjust or remove as desired.
    # To disable scheduled runs, comment the schedule section or the cron line.
    - cron: "0 6 * * 0"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository == 'tomyimkc/sophia-agi'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so we can commit cleanly
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Patreon supporters into SPONSORS.md + data/
        env:
          PATREON_CREATOR_ACCESS_TOKEN: ${{ secrets.PATREON_CREATOR_ACCESS_TOKEN }}
          PATREON_CREATOR_REFRESH_TOKEN: ${{ secrets.PATREON_CREATOR_REFRESH_TOKEN || '' }}
          PATREON_CAMPAIGN_ID: ${{ secrets.PATREON_CAMPAIGN_ID || '' }}
          # Optional client id/secret only needed for refresh flow
          PATREON_CLIENT_ID: ${{ secrets.PATREON_CLIENT_ID || '' }}
          PATREON_CLIENT_SECRET: ${{ secrets.PATREON_CLIENT_SECRET || '' }}
        run: |
          python tools/sync_patreon_supporters.py --update --write-json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add SPONSORS.md data/patreon_supporters.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(patreon): sync active supporters from Patreon API

            Auto-generated by .github/workflows/sync-patreon.yml

            [skip ci]"
            git push
            echo "Committed Patreon sync."
          fi

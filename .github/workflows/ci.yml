name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate attributions and training examples
        run: python tools/validate_attribution.py
      - name: Validate OKF wiki (drift, links, provenance)
        run: |
          python tools/wiki_sync.py check
          python tools/wiki_validate.py
          python tools/lint_wiki_provenance.py
      - name: OKF + provenance verifier tests
        run: |
          python tests/test_okf.py
          python tests/test_wiki_tools.py
          python tests/test_verifiers.py
          python tests/test_source_discipline_cli.py
          python tests/test_wiki_librarian.py
          python tests/test_wiki_mcp.py
          python tests/test_memory_consolidation.py
          python tests/test_wiki_proof.py
          python tests/test_agent_harness.py
      - name: Governance contract conformance (golden vectors + schema)
        run: |
          python tests/test_contract_conformance.py
          python tests/test_contract_guardrails.py
          python tests/test_contract_adapters.py
          python tests/test_role_pipeline.py
      - name: Model adapter + OpenClaw provider tests
        run: |
          python tests/test_model_adapter.py
          python tests/test_model_openclaw.py
          python tests/test_mcp_openclaw.py
      - name: Discipline layer tests (guarded loop, best-of-N, belief graph, miner)
        run: |
          python tests/test_discipline_records.py
          python tests/test_guarded.py
          python tests/test_mcp_check_claim.py
          python tests/test_okf_belief.py
          python tests/test_okf_counterfactual.py
          python tests/test_okf_revision.py
          python tools/belief_counterfactual.py remove chemical_imbalance_slogan >/dev/null
          python tools/belief_counterfactual.py revise mencius --also xunzi --reason ci-smoke >/dev/null
          python tests/test_best_of.py
          python tests/test_memory_recall_confidence.py
          python tests/test_mcp_belief.py
          python tests/test_mcp_counterfactual.py
          python tools/belief_counterfactual.py retract analects --reason ci-smoke >/dev/null
          python tests/test_mine_hard_negatives.py
          python tests/test_sophia_guard_cli.py
      - name: Provenance Delta benchmark tests
        run: |
          python tests/test_provenance_bench.py
          python tools/run_provenance_delta.py --models mock
          python tools/build_results_page.py --check
      - name: Generality tests (verifiers, improvement loop, horizon, external eval)
        run: |
          python tests/test_horizon.py
          python tests/test_external_eval.py
          python tools/run_improvement_loop.py
          python tools/run_horizon_curve.py --trials 10
          python tools/run_external_eval.py
      - name: Verifier synthesis (synthesise + meta-verify + calibrated abstention)
        run: |
          python tests/test_verifier_synthesis.py
          python tests/test_calibration.py
          python tools/run_verifier_synthesis.py
      - name: Runtime policies + model-in-loop + dataset fetcher (offline)
        run: |
          python tests/test_policies.py
          python tests/test_improvement_model_loop.py
          python tests/test_fetch_eval_dataset.py
      - name: Cross-entity generalization (the measured limit) + grounding gate
        run: |
          python tests/test_cross_entity.py
          python tools/run_cross_entity.py
          python tests/test_grounding_gate.py
          python tools/run_grounding_gate.py
          python tests/test_calibration_score.py
      - name: RLVR (verifier-as-reward GRPO) offline invariants
        run: |
          python tests/test_rlvr.py
          python tools/run_rlvr.py --model mock --dry-run
      - name: Local-agent delta (alone vs +gate vs +MCP-tools) offline wiring
        run: |
          python tests/test_local_agent_delta.py
          python tools/run_local_agent_delta.py --model mock
      - name: Corroboration-aware confidence (propagation semantics)
        run: |
          python tests/test_corroboration.py
          python tools/run_corroboration.py
      - name: Training safety — LoRA leakage guard + contamination control (#7)
        run: |
          python tests/test_training_safety.py
          python tests/test_contamination.py
          python tools/run_training_safety.py
      - name: Classification lattice — BLP + Biba + audited declassification (#3)
        run: |
          python tests/test_classification_lattice.py
          python tools/run_classification_lattice.py
      - name: Injection / containment red-team (M1) + data-flow firewall (M2/M2.2)
        run: |
          python tests/test_dataflow.py
          python tests/test_interpreter.py
          python tests/test_planner.py
          python tests/test_agentdojo.py
          python tests/test_security_redteam.py
          python tools/run_security_redteam.py
          python tools/run_agentdojo.py
      - name: Legal-AI verifier (citation existence, sources, gated benchmark)
        run: |
          python tests/test_legal_citation.py
          python tests/test_legal_sources.py
          python tests/test_legal_docs.py
          python tests/test_legal_faithfulness.py
          python tests/test_legal_faithfulness_bench.py
          python tests/test_legal_citation_bench.py
          python tools/run_legal_citation_bench.py
          python tools/run_legal_faithfulness_bench.py --judges mock --runs 1
          python tools/run_legal_faithfulness_bench.py --bench benchmark/legal_holding_faithful_hard.json --judges mock --runs 1
      - name: Runtime gate (legal self-gate + numeric soundness) + Cantonese
        run: |
          python tests/test_gate.py
          python tests/test_cantonese.py
      - name: Council deliberation (map-reduce + per-seat gate) + small-LLM uplift
        run: |
          python tests/test_council_deliberate.py
          python tools/council_deliberate.py "Model runway and flag AML for Stripe" --model mock >/dev/null
          python tools/run_council_uplift.py --model mock
      - name: Council panel (single vs homo vs hetero team) offline wiring
        run: |
          python tests/test_council_panel.py
          python tools/run_council_panel.py --models mock --homo-n 3 --limit 5
      - name: Council distillation (gate-filtered trace generation, offline)
        run: |
          python tests/test_distill_council.py
          python tools/distill_council_traces.py --teacher mock --limit 4 --out /tmp/council_traces_ci.jsonl
      - name: Unified uplift study (alone vs +gate/+council/+mcp-tools, one gate)
        run: |
          python tests/test_unified_uplift.py
          python tools/run_unified_uplift.py --model mock --limit 8
      - name: Gate logic upgrades (alias resolution, grounding, routing, graded, feedback)
        run: |
          python tests/test_entity_aliases.py
          python tests/test_grounded_gate.py
          python tests/test_claim_router.py
          python tests/test_graded_decision.py
          python tests/test_gate_feedback.py
      - name: Temporal verifier + active-learning promotion loop
        run: |
          python tests/test_temporal_verifier.py
          python tests/test_promote_pending.py
          python tools/promote_pending.py
      - name: Code-uplift (execute-and-repair; interpreter-as-verifier)
        run: |
          python tests/test_code_uplift.py
          python tools/run_code_uplift.py --model mock --limit 3
      - name: Export corpus JSONL
        run: python tools/export_training_jsonl.py
      - name: Corpus stats
        run: python tools/corpus_stats.py
      - name: Benchmark scorer regression (multilingual markers, GF-40)
        run: python tests/test_benchmark_scorer.py
      - name: Benchmark baselines (all domains)
        run: python tools/run_benchmark.py baseline all
      - name: Build and score reference responses
        run: |
          python tools/build_reference_responses.py
          python tools/update_leaderboards.py
      - name: Build web manifest
        run: |
          python tools/build_agi_proof_package.py
          python tools/build_web_data.py

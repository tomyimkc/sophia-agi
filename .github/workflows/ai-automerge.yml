name: ai-automerge
# Gated auto-merge. Only fires for a Copilot PR that is risk:low, all checks
# green, and not flagged for human review. Everything else waits for the
# Conductor / a human via Telegram.
on:
  check_suite: { types: [completed] }
permissions: { contents: write, pull-requests: write }
jobs:
  maybe-merge:
    if: github.event.check_suite.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({ ...context.repo, state: 'open' });
            const pr = prs.data.find(p => p.head.sha === context.payload.check_suite.head_sha);
            if (!pr) return;
            const labels = pr.labels.map(l => l.name);
            const safe = labels.includes('risk:low')
              && !labels.includes('human-only')
              && !labels.includes('needs-review');
            if (safe) {
              await github.rest.pulls.merge({
                ...context.repo, pull_number: pr.number, merge_method: 'squash'
              });
            }

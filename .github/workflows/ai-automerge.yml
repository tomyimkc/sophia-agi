name: ai-automerge
# Gated auto-merge via GitHub's NATIVE auto-merge (reliable; the check_suite
# trigger does not fire for Actions-created suites). When a PR is labeled
# risk:low (and not human-only/needs-review), enable auto-merge; GitHub then
# squash-merges it the moment all required status checks pass.
# Requires the repo setting "Allow auto-merge" (allow_auto_merge=true).
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, ready_for_review]
permissions:
  contents: write
  pull-requests: write
jobs:
  enable-automerge:
    if: >
      contains(github.event.pull_request.labels.*.name, 'risk:low') &&
      !contains(github.event.pull_request.labels.*.name, 'human-only') &&
      !contains(github.event.pull_request.labels.*.name, 'needs-review') &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable native auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash --repo ${{ github.repository }}

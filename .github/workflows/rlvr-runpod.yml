name: rlvr-runpod

# Manual-only RunPod RLVR launcher (the "RunPod through GitHub" path).
#
# This is the ONE workflow in this repo that uses a secret and can spend money.
# It is dispatch-only: it never runs on push/PR/schedule. On dispatch it uses the
# existing orchestrator `tools/runpod_rlvr.py` to rent a RunPod GPU pod via the
# RunPod REST API, run RLVR over SSH, copy the report back, and ALWAYS delete the
# pod. Any adapter-eval report that comes back is then run through the SSIL Layer-1
# gate (`tools/ingest_rlvr_eval.py`).
#
# PREREQUISITES (only you can do these):
#   1. Add a VALID RunPod API key as a repo secret named RUNPOD_API_KEY
#      (Settings -> Secrets and variables -> Actions). The runner reads it from the
#      secret; it is never written to the repo or logs.
#   2. Your RunPod account must have GPU credit. A pod costs real money while it runs.
#
# The secret is never printed; runpod_rlvr.py redacts it and deletes the pod in a
# finally block (plus a remote watchdog). Default mode is the cheap OFFLINE smoke so
# a first dispatch validates the whole path before you opt into a full live GRPO run.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RUN to confirm you accept renting a paid GPU pod'
        required: true
        default: ''
      remote_mode:
        description: 'offline = cheap remote smoke test; live = full GRPO (costs more)'
        required: true
        default: 'offline'
        type: choice
        options: [offline, live]
      task:
        description: 'RLVR reward task: provenance / math (sympy) / code (hidden-tests-pass) / concept (concept-TBox gate) / step (process: every step verified) / faithfulness (retrieve-then-reason + counterfactual citation-drop)'
        required: true
        default: 'provenance'
        type: choice
        options: [provenance, math, code, concept, step, faithfulness]
      step_domain:
        description: 'For task=step only: per-step oracle + held-out split (math needs sympy; physics pure-Python)'
        required: false
        default: 'math'
        type: choice
        options: [math, physics]
      entailment_provider:
        description: 'faithfulness task only: live entailment LLM behind the verify seam (needs DEEPSEEK_API_KEY / LLMHUB_API_KEY repo secrets). Blank = lexical placeholder.'
        required: false
        default: ''
        type: choice
        options: ['', deepseek, llmhub]
      limit:
        description: 'faithfulness task only: cap training cases (blank/0 = all; use 24 for a cheap validation)'
        required: false
        default: ''
      model:
        description: 'Subject model (HF id). Default = code-capable Qwen2.5-Coder; GLM-4-9B scores 0/48 under the chat template (base too weak).'
        required: false
        default: 'Qwen/Qwen2.5-Coder-7B-Instruct'
      reward:
        description: 'Reward signal (provenance task): verifier / gate (single-axis) / multiaxis (Thesis D dense — M1 collapse arm)'
        required: true
        default: 'verifier'
        type: choice
        options: [verifier, gate, multiaxis]
      epochs:
        description: 'Training epochs (live mode)'
        required: false
        default: '1.0'
      seed:
        description: 'Training+eval seed (vary across runs for independent replications)'
        required: false
        default: '0'
      gpu_type:
        description: 'RunPod GPU type preference (comma-separated; gpuTypePriority=availability picks an available one)'
        required: false
        default: 'NVIDIA A100 80GB PCIe,NVIDIA A100-SXM4-80GB,NVIDIA H100 80GB HBM3,NVIDIA H100 PCIe'
      interruptible:
        description: 'Use cheaper spot/interruptible pod (false = on-demand, more reliable allocation)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      network_volume_id:
        description: 'Optional persistent network-volume id (weight cache). Usually leave BLANK — re-downloading is cheaper below the break-even (~90 paid runs/mo @200MB/s; see tools/runpod_volume_breakeven.py). The pre-baked image, not a volume, is the real cost lever.'
        required: false
        default: ''

permissions:
  contents: read

# Concurrency key is per (task, seed, mode) so DIFFERENT runs go in PARALLEL
# (e.g. a 3-seed sweep, or provenance + math at once) — each rents its own pod —
# while an identical re-dispatch (same task+seed+mode) still queues, preventing
# accidental double-spend on the exact same run. Use distinct --seed per parallel
# run. NOTE: parallel pods = parallel paid GPUs (same total GPU-hours, higher peak
# spend); your RunPod account must have the quota/credit/GPU availability.
concurrency:
  group: rlvr-runpod-${{ github.event.inputs.task }}-${{ github.event.inputs.seed }}-${{ github.event.inputs.remote_mode }}
  cancel-in-progress: false

jobs:
  runpod:
    environment: runpod-paid
    runs-on: ubuntu-latest
    timeout-minutes: 240
    # Job-level env indirection: dispatch inputs are mapped to env vars here and
    # referenced as quoted shell variables inside run: blocks. This avoids
    # ${{ ... }} expression interpolation directly into shell scripts (the
    # GitHub Actions expression-injection / code-injection sink).
    env:
      IN_CONFIRM: ${{ github.event.inputs.confirm }}
      IN_REMOTE_MODE: ${{ github.event.inputs.remote_mode }}
      IN_TASK: ${{ github.event.inputs.task }}
      IN_STEP_DOMAIN: ${{ github.event.inputs.step_domain }}
      IN_ENTAILMENT_PROVIDER: ${{ github.event.inputs.entailment_provider }}
      IN_LIMIT: ${{ github.event.inputs.limit }}
      IN_MODEL: ${{ github.event.inputs.model }}
      IN_REWARD: ${{ github.event.inputs.reward }}
      IN_EPOCHS: ${{ github.event.inputs.epochs }}
      IN_SEED: ${{ github.event.inputs.seed }}
      IN_GPU_TYPE: ${{ github.event.inputs.gpu_type }}
      IN_INTERRUPTIBLE: ${{ github.event.inputs.interruptible }}
      IN_NETWORK_VOLUME_ID: ${{ github.event.inputs.network_volume_id }}
    steps:
      - uses: actions/checkout@v7

      - name: Preflight — confirm + secret present
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          if [ "$IN_CONFIRM" != "RUN" ]; then
            echo "::error::Dispatch input 'confirm' must be exactly RUN to acknowledge GPU cost. Aborting (no pod created)."
            exit 1
          fi
          if [ -z "$RUNPOD_API_KEY" ]; then
            echo "::error::Repo secret RUNPOD_API_KEY is not set (or empty). Add a VALID key in Settings -> Secrets and variables -> Actions. Aborting (no pod created)."
            exit 1
          fi
          echo "Preflight OK: confirmed, secret present. GPU runs on the rented pod, not this runner."

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Dry-run payload (no pod, no cost — sanity check the request)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          LIMIT="$IN_LIMIT"; [ -z "$LIMIT" ] && LIMIT=0
          python tools/runpod_rlvr.py --dry-run \
            --source git --branch "${{ github.ref_name }}" \
            --remote-mode "$IN_REMOTE_MODE" \
            --task "$IN_TASK" \
            --step-domain "$IN_STEP_DOMAIN" \
            --reward "$IN_REWARD" \
            --entailment-provider "$IN_ENTAILMENT_PROVIDER" \
            --limit "$LIMIT" \
            --model "$IN_MODEL" \
            --gpu-type "$IN_GPU_TYPE"

      - name: Launch RunPod RLVR (rents GPU, runs over SSH, deletes pod)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          # faithfulness task: forwarded into the pod env by runpod_rlvr.py (only when set).
          # Add these as repo Actions secrets to use --entailment-provider; unused otherwise.
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LLMHUB_API_KEY: ${{ secrets.LLMHUB_API_KEY }}
          LLMHUB_BASE_URL: ${{ vars.LLMHUB_BASE_URL }}
        run: |
          # argv as a bash array; optional flags appended as separate quoted elements
          # (no unquoted expansion -> no shell injection/word-splitting from dispatch inputs).
          # faithfulness uses a custom loop (no vLLM); other tasks keep the colocate vLLM stack.
          VLLM="colocate"; [ "$IN_TASK" = "faithfulness" ] && VLLM="none"
          LIMIT="$IN_LIMIT"; [ -z "$LIMIT" ] && LIMIT=0
          args=(--yes --source git --branch "${{ github.ref_name }}" --remote-mode "$IN_REMOTE_MODE" --task "$IN_TASK" --step-domain "$IN_STEP_DOMAIN" --reward "$IN_REWARD" --entailment-provider "$IN_ENTAILMENT_PROVIDER" --limit "$LIMIT" --model "$IN_MODEL" --epochs "$IN_EPOCHS" --seed "$IN_SEED" --quant bf16 --vllm "$VLLM" --gpu-type "$IN_GPU_TYPE")
          [ "$IN_INTERRUPTIBLE" = "true" ] && args+=(--interruptible)
          [ -n "$IN_NETWORK_VOLUME_ID" ] && args+=(--network-volume-id "$IN_NETWORK_VOLUME_ID")
          python tools/runpod_rlvr.py "${args[@]}"

      - name: Ingest the FRESH pod adapter-eval report into the SSIL Layer-1 gate
        if: always()
        run: |
          shopt -s globstar nullglob
          # Gate ONLY a freshly copied-back pod report (runpod-rlvr/ is the scp destination
          # for THIS run). The committed durable archive under rlvr-replication/ must NEVER be
          # re-gated here: a broad benchmark-results/** glob picks the committed seed0 archive
          # first (it sorts before runpod-rlvr/), which decouples the gate from the actual
          # training — it would re-promote stale numbers no matter what this run produced.
          # Fail-closed: if the pod produced no fresh eval, do NOT fall back to any committed
          # file. Do not swallow ingest errors (the tool is fail-closed on missing metrics).
          found=""
          for f in agi-proof/benchmark-results/runpod-rlvr/**/*adapter-eval*.json; do found="$f"; break; done
          if [ -n "$found" ]; then
            echo "Ingesting FRESH pod report: $found"
            python tools/ingest_rlvr_eval.py "$found" --print \
              --hardened --registry agi-proof/benchmark-results/rlvr-replication/registry.jsonl
          else
            echo "::warning::No fresh adapter-eval was copied back from the pod. NOT gating any"
            echo "committed archive (fail-closed). The live run produces sophia-rlvr-v1.adapter-eval.json"
            echo "via tools/eval_rlvr_adapter.py --mode real; only files under runpod-rlvr/ are gated here."
          fi

      - name: Upload RunPod artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rlvr-runpod-reports
          path: |
            agi-proof/benchmark-results/runpod-rlvr/**
            agi-proof/self-extension/ssil-layer1-real.public-report.json
          if-no-files-found: warn

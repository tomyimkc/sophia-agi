name: build-wisdom-image

# Build the pre-baked CUDA image (docker/wisdom-pilot/Dockerfile) and push it to GHCR, so the
# Sophia-Wisdom GPU pilot/ORPO pods skip the long pip install that caused container-restart-loop
# GPU wastage. Dispatch-only. After the first successful push, make the package PUBLIC
# (repo -> Packages -> wisdom-pilot -> Package settings -> Change visibility -> Public) so
# RunPod can pull it without registry creds.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag'
        required: false
        default: 'latest'

permissions:
  contents: read
  packages: write

concurrency:
  group: build-wisdom-image
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/wisdom-pilot
          file: docker/wisdom-pilot/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/wisdom-pilot:${{ github.event.inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report
        env:
          IN_TAG: ${{ github.event.inputs.tag }}
        run: |
          echo "Pushed ghcr.io/${{ github.repository_owner }}/wisdom-pilot:$IN_TAG"
          echo "NEXT: make the GHCR package PUBLIC, then run wisdom-pilot-runpod with"
          echo "      --image-name ghcr.io/${{ github.repository_owner }}/wisdom-pilot:$IN_TAG"

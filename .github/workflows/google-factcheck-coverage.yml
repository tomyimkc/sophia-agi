# Run the Google Fact Check Tools integration LIVE from GitHub.
#
# The GoogleFactCheckBackend (agent/live_sources.py) is implemented and unit-tested
# offline, and fails closed (coverage 0) without a key. CI never carries the key, so the
# live path is normally dormant. Dispatch this workflow to exercise it end-to-end: GitHub
# injects the repo Actions secret GOOGLE_FACTCHECK_API_KEY and runs the live coverage probe
# (general/viral claims = ClaimReview's home turf; literary-provenance = the honest gap the
# failure ledger predicts). The key is never printed; the report is uploaded as an artifact,
# not committed (it embeds volatile live data — keep it out of the tree to avoid drift).
name: google-factcheck-coverage

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which live probe to run'
        required: false
        default: 'coverage'
        type: choice
        options: ['coverage', 'corroborate', 'both']

permissions:
  contents: read

concurrency:
  group: google-factcheck-coverage
  cancel-in-progress: false

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Preflight — secret present
        env:
          GOOGLE_FACTCHECK_API_KEY: ${{ secrets.GOOGLE_FACTCHECK_API_KEY }}
        run: |
          if [ -z "$GOOGLE_FACTCHECK_API_KEY" ]; then
            echo "::error::Repo secret GOOGLE_FACTCHECK_API_KEY is not set (or empty). Add it in Settings -> Secrets and variables -> Actions. Aborting."
            exit 1
          fi
          echo "Preflight OK: GOOGLE_FACTCHECK_API_KEY present."

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Run live Google Fact Check probe(s)
        env:
          GOOGLE_FACTCHECK_API_KEY: ${{ secrets.GOOGLE_FACTCHECK_API_KEY }}
          MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail
          mkdir -p factcheck-live-reports
          if [ "$MODE" = "coverage" ] || [ "$MODE" = "both" ]; then
            python tools/run_google_factcheck_coverage.py \
              --out factcheck-live-reports/google-factcheck-coverage.json
          fi
          if [ "$MODE" = "corroborate" ] || [ "$MODE" = "both" ]; then
            python tools/factcheck_corroborate.py
            cp agi-proof/benchmark-results/wisdom-market/factcheck-corroboration.json \
               factcheck-live-reports/factcheck-corroboration.json || true
          fi

      - name: Upload live reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: google-factcheck-live-reports
          path: factcheck-live-reports/
          if-no-files-found: warn

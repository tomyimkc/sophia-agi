name: wisdom-pilot-runpod

# Manual-only launcher for the Sophia-Wisdom-4B M3 PILOT (pre-registered, corpus-bound).
# Trains a LoRA on the language tower of the gated multimodal google/gemma-3-4b-it on the
# deterministic gate-passed dataset, then evaluates base-vs-adapter on the held-out
# benchmark with the M1 instrument's scoring. Runs on a rented RunPod GPU (NOT this runner)
# via tools/runpod_wisdom_pilot.py (rent -> rsync -> SSH -> scp back -> ALWAYS delete pod).
#
# WHY a workflow: the dev exec container is HTTPS-egress-only and cannot SSH to a pod; a
# GitHub runner has open egress, so the proven SSH lifecycle works here.
#
# Secrets required: RUNPOD_API_KEY (GPU) and HF_TOKEN (gemma-3 is gated). Never printed.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RUN to confirm renting a paid GPU pod'
        required: true
        default: ''
      runs:
        description: 'Eval runs per condition (3 = pre-registered)'
        required: false
        default: '3'
      limit:
        description: 'Optional benchmark case cap (blank = full N=354)'
        required: false
        default: ''
      gpu_type:
        description: 'Comma-separated RunPod GPU preference'
        required: false
        default: 'NVIDIA A100 80GB PCIe,NVIDIA A100-SXM4-80GB,NVIDIA H100 PCIe'

permissions:
  contents: write   # commit the eval result back to the branch

concurrency:
  group: wisdom-pilot-runpod
  cancel-in-progress: false

jobs:
  pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v7

      - name: Preflight — confirm + secrets present
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          [ "$CONFIRM" = "RUN" ] || { echo "::error::input 'confirm' must be exactly RUN. Aborting (no pod)."; exit 1; }
          [ -n "$RUNPOD_API_KEY" ] || { echo "::error::secret RUNPOD_API_KEY missing."; exit 1; }
          [ -n "$HF_TOKEN" ] || { echo "::error::secret HF_TOKEN missing (gemma-3 is gated). Add it in Settings -> Secrets and variables -> Actions."; exit 1; }
          echo "Preflight OK. GPU runs on the rented pod, not this runner."

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Rebuild the deterministic gate-passed dataset (reproducible; no teacher)
        run: |
          python tools/build_sophia_wisdom_dataset.py --stats
          wc -l training/local_sophia_v3/mlx/train.jsonl

      - name: Dry-run pilot payload (no pod, no cost)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tools/runpod_wisdom_pilot.py --dry-run --runs "${{ github.event.inputs.runs }}"

      - name: Launch pilot on RunPod (trains + evals on the pod, then deletes it)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          LIMIT=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then LIMIT="--limit ${{ github.event.inputs.limit }}"; fi
          python tools/runpod_wisdom_pilot.py --yes \
            --runs "${{ github.event.inputs.runs }}" $LIMIT \
            --gpu-type "${{ github.event.inputs.gpu_type }}"

      - name: Surface the eval report in the run log
        if: always()
        run: |
          shopt -s nullglob
          for f in agi-proof/benchmark-results/runpod-wisdom-pilot/*.M3-pilot-eval.json; do
            echo "===== $f ====="; cat "$f"
          done

      - name: Commit the eval report back to the branch
        if: always()
        run: |
          shopt -s nullglob
          mkdir -p agi-proof/benchmark-results/wisdom-market
          copied=0
          for f in agi-proof/benchmark-results/runpod-wisdom-pilot/*.M3-pilot-eval.json; do
            cp "$f" agi-proof/benchmark-results/wisdom-market/M3-pilot-eval.json; copied=1
          done
          if [ "$copied" = "1" ]; then
            git config user.email noreply@anthropic.com
            git config user.name Claude
            git add agi-proof/benchmark-results/wisdom-market/M3-pilot-eval.json
            git commit -m "M3 pilot: eval result from RunPod run [skip ci]" || echo "nothing to commit"
            git push origin HEAD:${{ github.ref_name }} || echo "push failed"
          else
            echo "no eval report produced (see logs)"
          fi

      - name: Upload all pilot artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wisdom-pilot-artifacts
          path: agi-proof/benchmark-results/runpod-wisdom-pilot/**
          if-no-files-found: warn

name: wisdom-pilot-runpod

# Manual-only launcher for the Sophia-Wisdom-4B M3 PILOT (pre-registered, corpus-bound).
# Trains a LoRA on the language tower of the gated multimodal google/gemma-3-4b-it on the
# deterministic gate-passed dataset, then evaluates base-vs-adapter on the held-out
# benchmark with the M1 instrument's scoring. The GPU work runs on a rented RunPod pod.
#
# SSH-FREE design: tools/runpod_wisdom_pilot_selfreport.py creates the pod via the RunPod
# HTTPS API; the pod runs the WHOLE job in its start command (clone -> rebuild deterministic
# dataset -> smoke -> train -> eval) and GIT-PUSHES the eval report + log back to the branch
# using this run's GITHUB_TOKEN, then self-deletes. The launcher runs with --wait so the job
# stays alive (keeping GITHUB_TOKEN valid) until the pod is gone. No SSH session to drop.
#
# Secrets required: RUNPOD_API_KEY (GPU) and HF_TOKEN (gemma-3 is gated). Never printed.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RUN to confirm renting a paid GPU pod'
        required: true
        default: ''
      runs:
        description: 'Eval runs per condition (3 = pre-registered)'
        required: false
        default: '3'
      limit:
        description: 'Optional benchmark case cap (blank = full N=354)'
        required: false
        default: ''
      seed:
        description: 'Training+eval seed (0 = canonical; 1,2 for stability)'
        required: false
        default: '0'
      mode:
        description: 'sft (M3 pilot) or orpo (M4 preference)'
        required: false
        default: 'sft'
      image:
        description: 'Pod image (use the pre-baked ghcr.io/<owner>/wisdom-pilot:latest to avoid the pip restart-loop)'
        required: false
        default: ''
      registry_auth_id:
        description: 'RunPod container-registry-auth id (to pull a PRIVATE image without making it public)'
        required: false
        default: ''

permissions:
  contents: write   # the pod pushes the eval result back with this run's GITHUB_TOKEN

concurrency:
  group: wisdom-pilot-runpod
  cancel-in-progress: false

jobs:
  pilot:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v7

      - name: Preflight — confirm + secrets present
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          [ "$CONFIRM" = "RUN" ] || { echo "::error::input 'confirm' must be exactly RUN. Aborting (no pod)."; exit 1; }
          [ -n "$RUNPOD_API_KEY" ] || { echo "::error::secret RUNPOD_API_KEY missing."; exit 1; }
          [ -n "$HF_TOKEN" ] || { echo "::error::secret HF_TOKEN missing (gemma-3 is gated). Add it in Settings -> Secrets and variables -> Actions."; exit 1; }
          echo "Preflight OK. GPU runs on the rented pod, not this runner."

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Dry-run self-report payload (no pod, no cost)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PILOT_PAT: ${{ github.token }}
        run: python tools/runpod_wisdom_pilot_selfreport.py --dry-run --branch "${{ github.ref_name }}" --runs "${{ github.event.inputs.runs }}"

      - name: Launch SSH-free pilot on RunPod (pod self-reports via git push; waits until done)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PILOT_PAT: ${{ github.token }}
          RUNPOD_REGISTRY_AUTH_ID: ${{ github.event.inputs.registry_auth_id }}
        run: |
          LIMIT=""
          if [ -n "${{ github.event.inputs.limit }}" ]; then LIMIT="--limit ${{ github.event.inputs.limit }}"; fi
          IMAGE=""
          if [ -n "${{ github.event.inputs.image }}" ]; then IMAGE="--image-name ${{ github.event.inputs.image }}"; fi
          python tools/runpod_wisdom_pilot_selfreport.py --yes --wait \
            --branch "${{ github.ref_name }}" \
            --seed "${{ github.event.inputs.seed }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --runs "${{ github.event.inputs.runs }}" $LIMIT $IMAGE

      - name: Surface the pushed eval result (pull what the pod committed)
        if: always()
        run: |
          git pull --no-edit origin "${{ github.ref_name }}" || true
          if [ -f agi-proof/benchmark-results/wisdom-market/M3-pilot-eval.json ]; then
            echo "===== M3-pilot-eval.json ====="
            cat agi-proof/benchmark-results/wisdom-market/M3-pilot-eval.json
          else
            echo "no eval report on the branch yet — see agi-proof/benchmark-results/runpod-wisdom-pilot/pod-selfreport.log on the branch"
          fi

name: Deploy thesis site

# Publishes web/ to the gh-pages branch.
# Enable in Settings → Pages → Deploy from a branch → gh-pages → / (root)

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "tools/build_web_data.py"
      - "benchmark/results/**"
      - "VERSION"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build web manifest
        run: python tools/build_web_data.py
      - name: Add .nojekyll for GitHub Pages
        run: touch web/.nojekyll
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web
          force_orphan: true
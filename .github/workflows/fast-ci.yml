name: fast-ci

# Always-on fast lane: sub-2-minute feedback on EVERY PR (especially docs / lint /
# skills changes). It runs the cheap-but-critical gates only — syntax, the
# no-overclaim claims linter, attribution validation, and a handful of
# dependency-free unit tests. The heavy rigorous suite lives in ci.yml and runs
# (in parallel) whenever code/data changes or a PR is labelled 'full-ci'.
on:
  pull_request:
    branches: [main]

concurrency:
  group: fast-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Syntax check (compile all Python)
        run: >-
          python -m compileall -q
          agent tools tests sophia_mcp sophia_contract gateway selfextend
          provenance_bench skills okf scripts

      - name: Claims linter (no-overclaim copy gate)
        run: python tools/lint_claims.py

      - name: Attribution + training-example validation
        run: python tools/validate_attribution.py

      - name: Measurement contract — habit-not-fact + decontam + receipts
        run: |
          python tools/eval_stats.py
          python tools/lint_training_rows.py
          python tools/assert_decontam.py
          python tools/claim_gate.py --prefix M3-pilot
          python tools/claim_gate.py --prefix M3-transfer

      - name: Web privacy guard (no training/architecture leaks on the public site)
        run: python tools/lint_web_privacy.py

      - name: Core unit tests (fast, dependency-free)
        run: |
          python tests/test_skills.py
          python tests/test_skills_layer.py
          python tests/test_metacognition.py
          python tests/test_verifiers.py
          python tests/test_contract_conformance.py
          python tests/test_gateway.py
          python tests/test_fact_check_gate.py
          python tests/test_proof_search.py
          python tests/test_novelty_dag.py

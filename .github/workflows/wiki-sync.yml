name: Sync GitHub Wiki

# Renders the GitHub Wiki (the <repo>.wiki.git surface) from the OKF belief graph.
# data/*.json -> wiki/ (tools/wiki_sync.py) -> _wiki_build/ (tools/build_github_wiki.py)
# -> pushed to the wiki repo. The wiki is a generated mirror; never hand-edit it.
#
# One-time setup: the wiki repo only exists after the first page is created. If this
# job logs "wiki repo not initialized", create any page once via the repo's Wiki tab
# (github.com/tomyimkc/sophia-agi/wiki) and re-run — thereafter it is fully automatic.

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"
      - "data/**"
      - "okf/**"
      - "tools/build_github_wiki.py"
      - "tools/wiki_sync.py"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wiki pages from the OKF graph
        run: python tools/build_github_wiki.py --out _wiki_build

      - name: Push to the wiki repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIKI_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
        run: |
          set -euo pipefail
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if ! git clone --depth 1 "$WIKI_URL" wiki_repo 2>/dev/null; then
            echo "::warning::wiki repo not initialized — create the first page once via the Wiki tab, then re-run."
            exit 0
          fi

          # Replace tracked pages with the freshly generated set (keep .git).
          find wiki_repo -maxdepth 1 -name '*.md' -delete
          cp _wiki_build/*.md wiki_repo/

          cd wiki_repo
          git add -A
          if git diff --cached --quiet; then
            echo "wiki already up to date"
            exit 0
          fi
          git commit -m "wiki: sync from OKF belief graph @ ${GITHUB_SHA::7}"
          git push
          echo "wiki synced"

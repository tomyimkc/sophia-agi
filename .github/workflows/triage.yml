name: Triage

# Auto-labels incoming issues (regex over title/body) and PRs (changed paths), and
# optionally adds new issues to a Projects v2 board. The add-to-project job stays
# dormant until you set the PROJECT_URL repo variable and ADD_TO_PROJECT_PAT secret
# (see .github/PROJECT_AUTOMATION.md).

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label-issues:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - uses: github/issue-labeler@v3.4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/issue-labeler.yml
          enable-versioned-regex: 0
          include-title: 1
          include-body: 1

  label-prs:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: false

  add-to-project:
    if: github.event_name == 'issues' && github.event.action == 'opened' && vars.PROJECT_URL != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v2.0.0
        with:
          project-url: ${{ vars.PROJECT_URL }}
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}

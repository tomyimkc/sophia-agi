name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 06:17 UTC) so advisories on unchanged deps still surface.
    - cron: "17 6 * * 1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Dependency vulnerability audit (Python + Rust) ────────────────────────────
  deps-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit (advisory; aggregates all requirements*.txt)
        run: |
          python -m pip install --upgrade pip pip-audit
          shopt -s nullglob
          status=0
          for req in requirements*.txt; do
            echo "::group::pip-audit $req"
            pip-audit -r "$req" --progress-spinner off || status=1
            echo "::endgroup::"
          done
          # Non-blocking for now (advisory). Flip `exit $status` on once the
          # baseline is clean to make a new CVE fail the build.
          exit 0
      - name: cargo-audit (Rust crates under storage/ and services/)
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            rustup show >/dev/null 2>&1 || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source "$HOME/.cargo/env"
          fi
          cargo install cargo-audit --locked || true
          for lock in $(git ls-files '*Cargo.lock'); do
            echo "::group::cargo-audit $lock"
            cargo audit -f "$lock" || true
            echo "::endgroup::"
          done

  # ── Static analysis (CodeQL, Python) ──────────────────────────────────────────
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3

  # ── Secret scanning (gitleaks over full history) ──────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  # ── Lockfile / committed-secret self-audit (mirrors SECURITY.md, automated) ───
  repo-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: .env and private/ must be ignored
        run: |
          set -e
          git check-ignore .env private/ >/dev/null && echo "OK: .env and private/ ignored"
      - name: no API-key-shaped strings tracked
        run: |
          if git grep -nE "sk-[A-Za-z0-9]{20,}|hf_[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}" -- . ':!*.example' ':!docs/**' ; then
            echo "::error::possible secret committed (see matches above)"; exit 1
          fi
          echo "OK: no obvious secrets tracked"
      - name: system-prompt hygiene
        run: |
          python -m pip install --upgrade pip >/dev/null
          python tools/check_prompt_hygiene.py

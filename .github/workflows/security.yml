name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 06:17 UTC) so advisories on unchanged deps still surface.
    - cron: "17 6 * * 1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Dependency vulnerability audit (Python + Rust) ────────────────────────────
  deps-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit (BLOCKING; triaged baseline grandfathered)
        run: |
          python -m pip install --upgrade pip pip-audit
          # Ratchet: a NEW, untriaged CVE fails the build. The IDs below are the
          # baseline triaged on 2026-06-28 — heavy ML deps (torch/transformers/
          # vllm/diskcache) with no safe in-place bump yet. Remove an ID here the
          # moment its dependency is upgraded; do NOT add to this list without a
          # written justification in the PR.
          IGNORE=""
          for id in \
            PYSEC-2025-206 PYSEC-2025-204 PYSEC-2026-139 PYSEC-2025-203 \
            CVE-2025-2999 CVE-2025-3000 CVE-2025-3001 \
            PYSEC-2025-217 CVE-2026-1839 \
            CVE-2026-53923 CVE-2026-54236 CVE-2026-12491 CVE-2026-54235 CVE-2026-54233 \
            CVE-2025-69872 ; do
            IGNORE="$IGNORE --ignore-vuln $id"
          done
          shopt -s nullglob
          status=0
          for req in requirements*.txt; do
            echo "::group::pip-audit $req"
            pip-audit -r "$req" --progress-spinner off $IGNORE || status=1
            echo "::endgroup::"
          done
          exit $status
      - name: cargo-audit (BLOCKING; Rust crates under storage/ and services/)
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            rustup show >/dev/null 2>&1 || curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source "$HOME/.cargo/env"
          fi
          cargo install cargo-audit --locked
          # Ratchet (mirrors pip-audit): a NEW RustSec advisory fails the build.
          # Grandfather a triaged baseline by adding `--ignore RUSTSEC-YYYY-NNNN`
          # here with a written justification; the list is empty today.
          IGNORE=""
          status=0
          for lock in $(git ls-files '*Cargo.lock'); do
            echo "::group::cargo-audit $lock"
            cargo audit -f "$lock" $IGNORE || status=1
            echo "::endgroup::"
          done
          exit $status

  # ── Static analysis (CodeQL, Python) ──────────────────────────────────────────
  # Runs the security-AND-quality suite so CodeQL reports BOTH code-scanning
  # (security) and code-quality results — the `main` ruleset requires both
  # (code_scanning + code_quality gates). Test fixtures and the prompt-hygiene
  # scanner are excluded via the config file. Only error-severity alerts block.
  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml
      - uses: github/codeql-action/analyze@v3

  # ── Secret scanning (gitleaks over full history) ──────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required since gitleaks-action v2 for PR scans (uses the auto-created token).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ── Lockfile / committed-secret self-audit (mirrors SECURITY.md, automated) ───
  repo-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: .env and private/ must be ignored
        run: |
          set -e
          git check-ignore .env private/ >/dev/null && echo "OK: .env and private/ ignored"
      - name: no API-key-shaped strings tracked
        run: |
          # Exclude fixtures that legitimately contain FAKE key-shaped strings:
          # test suites (security detector fixtures), the gitleaks allowlist, and
          # documented placeholders/samples.
          if git grep -nE "sk-[A-Za-z0-9]{20,}|hf_[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}" -- . \
               ':!*.example' ':!docs/**' ':!tests/**' ':!.gitleaks.toml' ; then
            echo "::error::possible secret committed (see matches above)"; exit 1
          fi
          echo "OK: no obvious secrets tracked"
      - name: system-prompt hygiene
        run: |
          python -m pip install --upgrade pip >/dev/null
          python tools/check_prompt_hygiene.py

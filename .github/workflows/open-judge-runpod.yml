name: open-judge-runpod

# Leiden value 5 (autonomy), acceptance criterion #2: corroborate a saved result with a
# SELF-HOSTED open-weights judge — the non-proprietary validation path. A RunPod pod serves
# the model with vLLM (OpenAI-compatible, localhost only), runs tools/run_open_judge_regrade.py
# against it, git-pushes the receipt to this branch, and self-deletes.
#
# MANUAL ONLY (workflow_dispatch) + PAID. Honors the repo's cost guardrails:
#   - confirm=RUN gate + RUNPOD_API_KEY presence checked before anything,
#   - a free dry-run (payload only, no pod) runs before the paid launch,
#   - the launch job uses the `runpod-paid` environment -> a human must approve the run
#     (agents must never self-approve), and the pod self-deletes (launcher --wait is the backstop).
# Read .claude/skills/wisdom-gpu-prebaked before changing this. Cost discipline: keep the model
# small (7B) for the first validation; only scale after a clean cheap run.
#
# Inputs flow ONLY through env (never interpolated into run scripts) -> no Actions code-injection.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type RUN to confirm renting a PAID GPU pod
        required: true
        default: ""
      model:
        description: Open-weights model to serve as the judge (7B = cheapest first validation)
        required: true
        default: Qwen/Qwen2.5-7B-Instruct
      gpu_type:
        description: Comma-separated RunPod GPU type ids (tried in availability order)
        required: false
        default: NVIDIA A100 80GB PCIe,NVIDIA L40S,NVIDIA RTX A6000
      gpu_count:
        description: GPU count (raise for >32B models)
        required: false
        default: "1"
      result_path:
        description: Saved generation set to re-grade (must contain raw_generations)
        required: true
        default: training/swarm_router/theta_search_2family_result.json

permissions:
  contents: write   # the pod pushes the receipt back with this run's GITHUB_TOKEN

concurrency:
  group: open-judge-runpod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm gate + secret presence (no cost)
        env:
          IN_CONFIRM: ${{ github.event.inputs.confirm }}
          HAS_KEY: ${{ secrets.RUNPOD_API_KEY != '' }}
        run: |
          if [ "$IN_CONFIRM" != "RUN" ]; then
            echo "::error::Type RUN in the confirm input to rent a paid GPU pod."; exit 1
          fi
          if [ "$HAS_KEY" != "true" ]; then
            echo "::error::RUNPOD_API_KEY repo secret is not set (the old key was revoked per #276 — rotate + set it)."; exit 1
          fi
          echo "Preflight OK: confirmed + RUNPOD_API_KEY present. GPU runs on the rented pod, not this runner."

  dry-run:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Dry-run payload (no pod, no cost — sanity check the request)
        env:
          IN_MODEL: ${{ github.event.inputs.model }}
          IN_GPU_TYPE: ${{ github.event.inputs.gpu_type }}
          IN_GPU_COUNT: ${{ github.event.inputs.gpu_count }}
          IN_RESULT_PATH: ${{ github.event.inputs.result_path }}
        run: |
          python tools/runpod_open_judge_regrade.py --dry-run \
            --branch "${{ github.ref_name }}" \
            --model "$IN_MODEL" \
            --gpu-type "$IN_GPU_TYPE" \
            --gpu-count "$IN_GPU_COUNT" \
            --result-path "$IN_RESULT_PATH"

  launch:
    needs: dry-run
    runs-on: ubuntu-latest
    environment: runpod-paid   # human-approval gate on paid pods (#276); never self-approve
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Launch RunPod open-judge re-grade (rents GPU; pod self-reports + self-deletes)
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GH_PILOT_PAT: ${{ github.token }}
          IN_MODEL: ${{ github.event.inputs.model }}
          IN_GPU_TYPE: ${{ github.event.inputs.gpu_type }}
          IN_GPU_COUNT: ${{ github.event.inputs.gpu_count }}
          IN_RESULT_PATH: ${{ github.event.inputs.result_path }}
        run: |
          python tools/runpod_open_judge_regrade.py --yes --wait \
            --branch "${{ github.ref_name }}" \
            --model "$IN_MODEL" \
            --gpu-type "$IN_GPU_TYPE" \
            --gpu-count "$IN_GPU_COUNT" \
            --result-path "$IN_RESULT_PATH"

      - name: Surface the pushed receipt
        if: always()
        run: |
          git pull --ff-only origin "${{ github.ref_name }}" || true
          echo "Receipt (if the pod pushed it): agi-proof/benchmark-results/wisdom-market/open-judge-regrade.json"

name: "Sophia CodeQL config"

# Test suites and the red-team corpus contain FAKE credentials, decoy phrases,
# and attack payloads by design (security detector fixtures). Scanning them for
# hardcoded-credentials / sensitive-data produces false positives, so exclude
# them from analysis. Real source under agent/, gateway/, tools/, etc. is scanned.
paths-ignore:
  - tests
  - eval/redteam
  - "**/test_*.py"
  # The prompt-hygiene scanner deliberately matches secret-shaped strings and
  # reports findings to the operator. CodeQL's clear-text-logging heuristic treats
  # any value derived from its secret-matcher as sensitive, so it flags the
  # finding output even though every value is masked to "<redacted: N chars>"
  # (verified: no secret is ever emitted). Reviewed false positive — exclude only
  # this single utility, not the rest of tools/.
  - tools/check_prompt_hygiene.py
  # The self-extend env verifier compiles a CANDIDATE regex supplied in the eval
  # spec and runs it against fixtures — compiling a caller-provided pattern IS its
  # contract (it verifies whether a proposed regex matches). CodeQL's regex-injection
  # and polynomial-redos heuristics necessarily flag the deliberate `re.compile(candidate)`;
  # the input is eval-time task data, not a production request. Reviewed — exclude
  # only this single verifier utility.
  - selfextend/env_verifier.py
  # The agent wiki/memory store writes a page whose id comes from a request. The id is
  # validated at the source with a strict slug allowlist (`[A-Za-z0-9._-]+`, explicit
  # "."/".." rejection) and the write is further guarded by resolve()+relative_to()+parent
  # containment checks, so path traversal is impossible at runtime. CodeQL's path-injection
  # query only models const-compare barriers, so it cannot see this custom validation and
  # reports the writes as false positives. Reviewed — exclude only this single module.
  - agent/wiki_store.py

# Query-level filters (applied after path filtering).
query-filters:
  # py/cyclic-import is a low-severity *recommendation*. Several core runtime modules
  # form deliberate import cycles that are already mitigated with function-local (lazy)
  # imports so they load correctly at runtime — e.g. agent.hooks <-> agent.conscience_enforcement,
  # agent.harness <-> agent.conscience_runtime, agent.guarded <-> agent.datalog_provenance,
  # agent.retrieval <-> agent.vector_store, provenance_bench.ontology_rl_{dataset,reward}.
  # The query also counts the lazy back-import as a cycle edge, so the cycle cannot be
  # cleared without extracting shared symbols into new leaf modules — a risky refactor of
  # the conscience/harness safety path for no behavioural gain. Reviewed: accept the
  # intentional cycles and exclude this recommendation repo-wide.
  - exclude:
      id: py/cyclic-import

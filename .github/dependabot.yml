# Dependabot: weekly security + version-update PRs.
# Picks up requirements-*.txt (lora / mcp / rag / rl) and the GitHub Actions used in
# .github/workflows/. Minor/patch bumps are grouped into one PR to limit noise; majors
# stay separate so they can be reviewed individually.
version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - tooling
    commit-message:
      prefix: "deps"
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "deps"
    groups:
      rust-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "ci"
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
